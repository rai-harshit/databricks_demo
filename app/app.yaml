command: ["streamlit", "run", "app.py"]

env:
  - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
    value: "false"

  # Populated at runtime with the id of the sql_warehouse resource below.
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql_warehouse

  # Dashboard id shown on Tab 1 — get it from the dashboard's URL
  # (.../dashboardsv3/<THIS_PART>/published).
  - name: APP_DASHBOARD_ID
    value: "<YOUR_DASHBOARD_ID>"

  # Optional — only set if your catalog/schemas aren't the defaults.
  # - { name: APP_CATALOG,       value: "my_catalog" }
  # - { name: APP_SILVER_SCHEMA, value: "silver_claims" }
  # - { name: APP_GOLD_SCHEMA,   value: "gold_claims" }
  # - { name: APP_SCHEMA,        value: "app_data" }

# deploy.sh reads this block and attaches the warehouse to the app as a
# proper resource binding (the Databricks platform does not honor a
# resources: block in app.yaml on its own).
resources:
  - name: sql_warehouse
    sql_warehouse:
      # Warehouse id — SQL Warehouses → (warehouse) → Overview.
      id: "<YOUR_WAREHOUSE_ID>"
      permission: CAN_USE
